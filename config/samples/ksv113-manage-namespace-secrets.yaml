apiVersion: rbacreports.incloud.io/v1alpha1
kind: RbacPolicy
metadata:
  name: ksv113-manage-namespace-secrets
spec:
  severity: MEDIUM
  category: Kubernetes Security Check
  checkID: KSV113
  title: Manage namespace secrets
  description: >-
    Read or write access to Secrets in a namespace exposes ServiceAccount
    tokens, TLS material, and credentials. Even read-only access can be used
    to escalate via another ServiceAccount that has higher cluster privileges.
  remediation: >-
    Limit Secret access to the workloads that genuinely need a specific Secret,
    using resourceNames where possible. Read access for general-purpose
    automation is almost always a smell.
  targetKinds:
    - Role
  match:
    apiGroups: [""]
    resources: [secrets]
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - "*"
