apiVersion: rbacreports.in-cloud.io/v1alpha1
kind: RbacPolicy
metadata:
  name: ksv041-manage-cluster-secrets
spec:
  severity: CRITICAL
  category: Kubernetes Security Check
  checkID: KSV041
  title: Manage secrets
  description: >-
    Cluster-scoped access to Secrets is functionally equivalent to cluster-admin
    because Secrets contain credentials, ServiceAccount tokens, and TLS material
    that grant access to every namespace.
  remediation: >-
    Replace ClusterRole access to Secrets with a namespaced Role bound only to
    the specific namespaces that require it. If a controller genuinely needs
    cluster-wide access, restrict the verbs to the minimum required.
  targetKinds:
    - ClusterRole
  match:
    apiGroups: [""]
    resources: [secrets]
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
      - "*"
