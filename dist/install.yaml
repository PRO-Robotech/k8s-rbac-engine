apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clusterrbacreports.rbacreports.incloud.io
spec:
  group: rbacreports.incloud.io
  names:
    kind: ClusterRbacReport
    listKind: ClusterRbacReportList
    plural: clusterrbacreports
    shortNames:
    - crr
    singular: clusterrbacreport
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.roleRef.name
      name: ClusterRole
      type: string
    - jsonPath: .report.summary.criticalCount
      name: Critical
      type: integer
    - jsonPath: .report.summary.highCount
      name: High
      type: integer
    - jsonPath: .report.summary.mediumCount
      name: Medium
      type: integer
    - jsonPath: .report.summary.lowCount
      name: Low
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterRbacReport - ...
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          report:
            description: Report holds the violation list and the severity-bucket aggregation.
            properties:
              checks:
                items:
                  description: |-
                    Check describes one policy that was violated by the role. Multiple
                    PolicyRules of the same role hitting the same policy are coalesced into
                    a single Check with multiple Messages by the report builder.
                  properties:
                    category:
                      type: string
                    checkID:
                      type: string
                    description:
                      type: string
                    messages:
                      items:
                        type: string
                      type: array
                    remediation:
                      type: string
                    severity:
                      description: Severity classifies the impact of a policy violation.
                      enum:
                      - CRITICAL
                      - HIGH
                      - MEDIUM
                      - LOW
                      type: string
                    success:
                      description: |-
                        Success is always false in the current schema: the report only
                        contains violations. The field exists for Trivy schema compatibility.
                      type: boolean
                    title:
                      type: string
                  required:
                  - category
                  - checkID
                  - messages
                  - severity
                  - success
                  - title
                  type: object
                type: array
              summary:
                description: |-
                  Summary aggregates the per-severity violation counts. TotalCount is the
                  sum of the four bucket counts and is set by the report builder.
                properties:
                  criticalCount:
                    type: integer
                  highCount:
                    type: integer
                  lowCount:
                    type: integer
                  mediumCount:
                    type: integer
                  totalCount:
                    type: integer
                required:
                - criticalCount
                - highCount
                - lowCount
                - mediumCount
                - totalCount
                type: object
            required:
            - checks
            - summary
            type: object
          spec:
            description: |-
              ReportSpec carries the back-pointer to the audited role and the scanner
              metadata block (Trivy-compatible).
            properties:
              roleRef:
                description: RoleRef identifies the audited Role/ClusterRole.
                properties:
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - kind
                - name
                type: object
              scanner:
                description: Scanner identifies the tool that produced the report.
                properties:
                  name:
                    type: string
                  vendor:
                    type: string
                  version:
                    type: string
                required:
                - name
                - vendor
                - version
                type: object
            required:
            - roleRef
            - scanner
            type: object
        required:
        - report
        - spec
        type: object
    served: true
    storage: true
    subresources: {}
