apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: rbacpolicies.rbacreports.incloud.io
spec:
  group: rbacreports.incloud.io
  names:
    kind: RbacPolicy
    listKind: RbacPolicyList
    plural: rbacpolicies
    shortNames:
    - rp
    singular: rbacpolicy
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RbacPolicy is a cluster-scoped declarative security policy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RbacPolicySpec is the user-authored specification of an RbacPolicy.
            properties:
              category:
                type: string
              checkID:
                type: string
              description:
                type: string
              exclude:
                properties:
                  namespaces:
                    items:
                      type: string
                    type: array
                  roleNames:
                    items:
                      type: string
                    type: array
                type: object
              match:
                properties:
                  apiGroups:
                    items:
                      type: string
                    type: array
                  conditions:
                    items:
                      description: |-
                        Condition is one predicate of an RbacPolicy advanced-match block.
                        containsExact and notContains read Value; containsAny, containsAll, and
                        hasIntersection read Values.
                      properties:
                        field:
                          description: Field identifies which slice of a PolicyRule
                            a condition targets.
                          type: string
                        operator:
                          description: Operator identifies the predicate kind.
                          type: string
                        value:
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                      required:
                      - field
                      - operator
                      type: object
                    type: array
                  matchMode:
                    description: MatchMode controls how "*" is interpreted during
                      policy matching.
                    enum:
                    - wildcard
                    - exact
                    type: string
                  resources:
                    items:
                      type: string
                    type: array
                  verbs:
                    items:
                      type: string
                    type: array
                type: object
              remediation:
                type: string
              severity:
                description: Severity classifies the impact of a policy violation.
                enum:
                - CRITICAL
                - HIGH
                - MEDIUM
                - LOW
                type: string
              targetKinds:
                description: |-
                  TargetKinds restricts the policy to specific role kinds. Empty means
                  the policy applies to both Role and ClusterRole.
                items:
                  type: string
                type: array
              title:
                type: string
            required:
            - category
            - checkID
            - match
            - severity
            - title
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
