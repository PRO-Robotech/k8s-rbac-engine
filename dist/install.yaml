apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: aggregated-apiserver
    app.kubernetes.io/name: rbac-engine
  name: rbac-engine
  namespace: rbac-engine-system
spec:
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: apiserver
  selector:
    app.kubernetes.io/component: manager
    app.kubernetes.io/name: rbac-engine
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/name: rbac-engine
  name: rbac-engine
  namespace: rbac-engine-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: manager
      app.kubernetes.io/name: rbac-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/component: manager
        app.kubernetes.io/name: rbac-engine
    spec:
      containers:
      - args:
        - --mode=all
        - --secure-port=6443
        - --audit-log-path=-
        image: rbac-engine:dev
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 6443
          name: apiserver
          protocol: TCP
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: healthz
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: rbac-engine
      terminationGracePeriodSeconds: 10
      volumes:
      - emptyDir: {}
        name: tmp
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  labels:
    app.kubernetes.io/component: aggregated-apiserver
    app.kubernetes.io/name: rbac-engine
  name: v1alpha1.rbacgraph.incloud.io
spec:
  group: rbacgraph.incloud.io
  groupPriorityMinimum: 100
  insecureSkipTLSVerify: true
  service:
    name: rbac-engine
    namespace: rbac-engine-system
    port: 443
  version: v1alpha1
  versionPriority: 100
